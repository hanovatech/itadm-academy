[build]
  publish = "."

# Sicherheits-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Saubere URLs (optional)
[[redirects]]
  from = "/linux"
  to = "/linux/index.html"
  status = 200
